name: Sync jobs

# Disparo manual (botão "Sincronizar agora" do admin chama a API de dispatch).
# O cron semanal continua no Railway (run_cron.sh); este workflow é sob demanda.
on:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: sync-jobs
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install deps
        run: pip install -r requirements.txt

      - name: Run sync
        env:
          APIFY_TOKEN: ${{ secrets.APIFY_TOKEN }}
        run: python scripts/jobs_sync.py

      - name: Commit & push if changed
        run: |
          git config user.email "actions@astella.vc"
          git config user.name "Astella Jobs Actions"
          FILES="jobs.json public/jobs.json public/job-postings.jsonld src/data/jobs.generated.json src/data/sync_log.json public/empresas/"
          if ! git diff --quiet -- $FILES; then
            git add $FILES
            git commit -m "chore: manual sync $(date -u +%Y-%m-%dT%H:%M:%SZ)"
            git push
            echo "Pushed — Vercel rebuild triggered."
          else
            echo "No changes detected."
          fi
